<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Korner">
    <title>Korner - Canlı Yayınlar</title>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        /* GENEL AYARLAR */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #121212; color: #ffffff; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        ::-webkit-scrollbar { display: none; }

        /* ÜST BAŞLIK */
        header { background-color: #1E1E1E; padding: 15px; text-align: center; border-bottom: 1px solid #2A2A2A; padding-top: env(safe-area-inset-top, 15px); }
        header h1 { font-size: 20px; color: #10B981; font-weight: 800; letter-spacing: 1px; }

        /* ANA İÇERİK */
        main { flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 90px; }

        /* VİDEO OYNATICI (CUSTOM PLAYER) */
        .video-wrapper { width: 100%; aspect-ratio: 16/9; background-color: #000; border-radius: 12px; margin-bottom: 20px; position: relative; display: flex; align-items: center; justify-content: center; border: 1px solid #2A2A2A; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: contain; }
        
        /* Oynatıcı Kontrolleri (Overlay) */
        .controls-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s; z-index: 10; }
        .controls-overlay.show { opacity: 1; }
        
        .center-controls { display: flex; align-items: center; gap: 30px; }
        .icon-btn { color: #fff; font-size: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; background: transparent; border: none; outline: none; }
        .play-btn { width: 70px; height: 70px; border-radius: 35px; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(16, 185, 129, 0.5); color: #10B981; font-size: 40px; }
        
        .live-badge { position: absolute; bottom: 16px; left: 16px; display: flex; align-items: center; background: rgba(239, 68, 68, 0.2); padding: 4px 8px; border-radius: 6px; border: 1px solid rgba(239, 68, 68, 0.5); }
        .live-dot { width: 6px; height: 6px; border-radius: 3px; background-color: #EF4444; margin-right: 6px; animation: pulse 1.5s infinite; }
        .live-text { color: #EF4444; font-size: 12px; font-weight: bold; letter-spacing: 1px; }
        
        .fullscreen-btn { position: absolute; bottom: 16px; right: 16px; padding: 8px; background: rgba(255, 255, 255, 0.15); border-radius: 8px; color: #fff; font-size: 24px; cursor: pointer; border: none; }

        .placeholder-text { color: #666; font-size: 14px; position: absolute; z-index: 5; pointer-events: none; }

        /* KANAL LİSTESİ */
        .section-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; }
        .channel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .channel-card { background-color: #1E1E1E; padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #2A2A2A; cursor: pointer; transition: 0.2s; }
        .channel-card:active { transform: scale(0.95); }
        .channel-card.active { border-color: #10B981; background-color: rgba(16, 185, 129, 0.1); }
        .channel-card.active span { color: #10B981; }
        .channel-card span { font-size: 14px; font-weight: 600; color: #fff; }

        /* ALT SEKMELER */
        nav { position: fixed; bottom: 0; left: 0; width: 100%; background-color: #1E1E1E; display: flex; justify-content: space-around; padding: 10px 0; padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px)); border-top: 1px solid #2A2A2A; z-index: 999; }
        .tab { display: flex; flex-direction: column; align-items: center; color: #666; cursor: pointer; text-decoration: none; width: 33%; }
        .tab.active { color: #10B981; }
        .tab ion-icon { font-size: 24px; margin-bottom: 4px; }
        .tab span { font-size: 12px; font-weight: 600; }

        /* YÜKLENİYOR İKONU */
        .loader { border: 3px solid #2A2A2A; border-top: 3px solid #10B981; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 30px auto; display: none; }
        
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(1.5); } 100% { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <header>
        <h1>KORNER</h1>
    </header>

    <main>
        <div class="video-wrapper" id="video-wrapper">
            <span class="placeholder-text" id="placeholder-text">Yayın izlemek için bir kanal seçin</span>
            <video id="video-player" playsinline></video>
            
            <div class="controls-overlay" id="controls-overlay">
                <div class="center-controls">
                    <button class="icon-btn" onclick="skipBackward(event)"><ion-icon name="play-back"></ion-icon></button>
                    <button class="icon-btn play-btn" id="play-pause-btn" onclick="togglePlay(event)"><ion-icon name="play"></ion-icon></button>
                    <button class="icon-btn" onclick="skipForward(event)"><ion-icon name="play-forward"></ion-icon></button>
                </div>
                
                <div class="live-badge">
                    <div class="live-dot"></div>
                    <span class="live-text">CANLI</span>
                </div>

                <button class="fullscreen-btn" onclick="toggleFullscreen(event)">
                    <ion-icon name="expand"></ion-icon>
                </button>
            </div>
        </div>

        <div class="section-title">Canlı Kanallar</div>
        <div id="loader" class="loader"></div>
        <div id="channel-list" class="channel-grid"></div>
    </main>

    <nav>
        <a href="index.html" class="tab">
            <ion-icon name="partly-sunny"></ion-icon>
            <span>Hava</span>
        </a>
        <a href="live.html" class="tab active">
            <ion-icon name="radio"></ion-icon>
            <span>Canlı</span>
        </a>
        <a href="team.html" class="tab">
            <ion-icon name="shield-half"></ion-icon>
            <span>Takımım</span>
        </a>
    </nav>

    <script>
        const API_URL = 'https://raw.githubusercontent.com/akropavic/kacakci/refs/heads/main/stream_links.json';
        const channelListEl = document.getElementById('channel-list');
        const loaderEl = document.getElementById('loader');
        
        // Video ve UI Elementleri
        const video = document.getElementById('video-player');
        const videoWrapper = document.getElementById('video-wrapper');
        const controlsOverlay = document.getElementById('controls-overlay');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const placeholderText = document.getElementById('placeholder-text');
        
        let hls; // HLS nesnesi
        let hideTimeout;
        let activeCard = null;

        // --- KONTROL ARAYÜZÜ FONKSİYONLARI ---

        // Ekrana dokununca kontrolleri göster/gizle
        videoWrapper.addEventListener('click', () => {
            if(!video.src && !hls) return; // Yayın yoksa bir şey yapma
            
            controlsOverlay.classList.add('show');
            if (hideTimeout) clearTimeout(hideTimeout);
            
            // 3.5 saniye sonra gizle
            hideTimeout = setTimeout(() => {
                if (!video.paused) {
                    controlsOverlay.classList.remove('show');
                }
            }, 3500);
        });

        // Oynat / Duraklat
        function togglePlay(e) {
            e.stopPropagation(); // Tıklamanın wrapper'a geçmesini engelle
            if (video.paused) {
                video.play();
                playPauseBtn.innerHTML = '<ion-icon name="pause"></ion-icon>';
            } else {
                video.pause();
                playPauseBtn.innerHTML = '<ion-icon name="play" style="margin-left: 4px;"></ion-icon>';
            }
        }

        // İleri Sar
        function skipForward(e) {
            e.stopPropagation();
            video.currentTime += 10;
        }

        // Geri Sar
        function skipBackward(e) {
            e.stopPropagation();
            video.currentTime -= 10;
        }

        // Tam Ekran
        function toggleFullscreen(e) {
            e.stopPropagation();
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                if (videoWrapper.requestFullscreen) {
                    videoWrapper.requestFullscreen();
                } else if (videoWrapper.webkitRequestFullscreen) { // Safari/iOS desteği
                    videoWrapper.webkitRequestFullscreen();
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                }
            }
        }

        // Video oynadığında buton durumunu güncelle
        video.addEventListener('play', () => {
            playPauseBtn.innerHTML = '<ion-icon name="pause"></ion-icon>';
        });
        video.addEventListener('pause', () => {
            playPauseBtn.innerHTML = '<ion-icon name="play" style="margin-left: 4px;"></ion-icon>';
            controlsOverlay.classList.add('show'); // Duraklatıldığında kontroller açık kalsın
            if (hideTimeout) clearTimeout(hideTimeout);
        });

        // --- YAYIN ÇEKME VE OYNATMA ---

        async function fetchChannels() {
            loaderEl.style.display = 'block';
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                for (const key in data) {
                    const title = key.toUpperCase().replace(/(\d+)/g, ' $1');
                    const url = data[key][0];

                    const card = document.createElement('div');
                    card.className = 'channel-card';
                    card.innerHTML = `<span>${title}</span>`;
                    
                    card.onclick = () => playStream(url, card);
                    channelListEl.appendChild(card);
                }
            } catch (error) {
                console.error("Linkler çekilirken hata:", error);
                placeholderText.innerText = "Kanal listesi alınamadı!";
            } finally {
                loaderEl.style.display = 'none';
            }
        }

        function playStream(url, cardElement) {
            if (activeCard) activeCard.classList.remove('active');
            cardElement.classList.add('active');
            activeCard = cardElement;

            placeholderText.style.display = 'none';
            playPauseBtn.innerHTML = '<ion-icon name="pause"></ion-icon>'; // Yüklenirken pause ikonuna geç

            // Önceki yayını temizle
            if (hls) {
                hls.destroy();
            }

            // HLS desteği (Android / PC Chrome)
            if (Hls.isSupported()) {
                hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play();
                });
            } 
            // Native destek (iOS Safari)
            else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.play();
            }

            // Kontrolleri göster ve süreyi başlat
            controlsOverlay.classList.add('show');
            if (hideTimeout) clearTimeout(hideTimeout);
            hideTimeout = setTimeout(() => controlsOverlay.classList.remove('show'), 3500);
        }

        // İlk yükleme
        fetchChannels();
    </script>
</body>
</html>
